# --- poll + parse + render --------------------------------------------------
interval:
  - interval: ${poll_interval}
    then:
      - http_request.get:
          url: ${agg_url}
          capture_response: true
          # self-report identity so the admin UI can track this panel
          request_headers:
            x-panel-id: !lambda 'return id(g_panel_id).c_str();'
            x-panel-version: "${fw_version}"
          on_response:
            then:
              - lambda: |-
                  bool dk = id(g_dark);
                  uint32_t c_fg   = dk ? 0xF0F0F0 : 0x000000;
                  uint32_t c_crit = dk ? 0xFF5555 : 0xCC0000;
                  uint32_t c_warn = dk ? 0xFFC040 : 0xC07000;
                  uint32_t c_ok   = dk ? 0x66DD66 : 0x2E9E2E;

                  if (response->status_code != 200) {
                    lv_label_set_text(id(t_cluster), "CLUSTER  unreachable");
                    lv_obj_set_style_text_color(id(t_cluster), lv_color_hex(c_crit), 0);
                    lv_obj_set_style_text_color(id(t_pools),   lv_color_hex(c_crit), 0);
                    lv_obj_set_style_text_color(id(t_pbs),     lv_color_hex(c_crit), 0);
                    id(g_alert) = true;
                    return;
                  }
                  json::parse_json(body, [c_fg, c_crit, c_warn, c_ok](JsonObjectConst root) -> bool {
                    char buf[48];

                    bool quorate = root["quorate"] | false;
                    bool alert = root["alert"] | false;
                    id(g_alert) = alert;

                    // page titles: amber on alert; cluster also shows quorum (red if lost)
                    uint32_t tcol = alert ? c_warn : c_fg;
                    snprintf(buf, sizeof(buf), "CLUSTER  quorum:%s", quorate ? "OK" : "LOST");
                    lv_label_set_text(id(t_cluster), buf);
                    lv_obj_set_style_text_color(id(t_cluster),
                        lv_color_hex(quorate ? tcol : c_crit), 0);
                    lv_obj_set_style_text_color(id(t_pools), lv_color_hex(tcol), 0);
                    lv_obj_set_style_text_color(id(t_pbs),   lv_color_hex(tcol), 0);

                    // --- cluster nodes (concentric CPU outer / MEM inner rings) ---
                    lv_obj_t* clbl[5] = { id(cl0), id(cl1), id(cl2), id(cl3), id(cl4) };
                    lv_obj_t* ccpu[5] = { id(ca0), id(ca1), id(ca2), id(ca3), id(ca4) };
                    lv_obj_t* cmem[5] = { id(cm0), id(cm1), id(cm2), id(cm3), id(cm4) };
                    lv_obj_t* cvl[5]  = { id(cv0), id(cv1), id(cv2), id(cv3), id(cv4) };
                    JsonArrayConst nodes = root["nodes"];
                    for (int i = 0; i < 5; i++) {
                      if (i < (int) nodes.size()) {
                        const char* nm = nodes[i]["name"] | "?";
                        bool up = nodes[i]["up"] | false;
                        int cpu = nodes[i]["cpu"] | 0;
                        int mem = nodes[i]["mem"] | 0;
                        lv_label_set_text(clbl[i], nm);
                        lv_obj_set_style_text_color(clbl[i], lv_color_hex(up ? c_fg : c_crit), 0);
                        if (up) {
                          lv_arc_set_value(ccpu[i], cpu);
                          lv_arc_set_value(cmem[i], mem);
                          lv_obj_set_style_arc_color(ccpu[i],
                              lv_color_hex(cpu >= 90 ? c_crit : 0x33CCFF), LV_PART_INDICATOR);
                          lv_obj_set_style_arc_color(cmem[i],
                              lv_color_hex(mem >= 90 ? c_crit : 0xFF9F40), LV_PART_INDICATOR);
                          snprintf(buf, sizeof(buf), "C%d  M%d", cpu, mem);
                          lv_label_set_text(cvl[i], buf);
                        } else {
                          lv_arc_set_value(ccpu[i], 0);
                          lv_arc_set_value(cmem[i], 0);
                          lv_label_set_text(cvl[i], "DOWN");
                        }
                      } else {
                        lv_label_set_text(clbl[i], "");
                        lv_label_set_text(cvl[i], "");
                        lv_arc_set_value(ccpu[i], 0);
                        lv_arc_set_value(cmem[i], 0);
                      }
                    }

                    // --- truenas pools (gauge cards) ---
                    lv_obj_t* plbl[4] = { id(p0l), id(p1l), id(p2l), id(p3l) };
                    lv_obj_t* parc[4] = { id(p0a), id(p1a), id(p2a), id(p3a) };
                    lv_obj_t* pval[4] = { id(p0v), id(p1v), id(p2v), id(p3v) };
                    lv_obj_t* phl[4]  = { id(p0h), id(p1h), id(p2h), id(p3h) };
                    JsonArrayConst pools = root["pools"];
                    for (int i = 0; i < 4; i++) {
                      if (i < (int) pools.size()) {
                        const char* nm = pools[i]["name"] | "?";
                        const char* hl = pools[i]["health"] | "?";
                        bool ok = pools[i]["ok"] | false;
                        int used = pools[i]["used"] | 0;
                        lv_label_set_text(plbl[i], nm);
                        snprintf(buf, sizeof(buf), "%d%%", used);
                        lv_label_set_text(pval[i], buf);
                        lv_label_set_text(phl[i], hl);
                        lv_arc_set_value(parc[i], used);
                        uint32_t c = c_ok;
                        if (!ok) c = c_crit;               // degraded/unhealthy
                        else if (used >= 85) c = c_warn;   // near full
                        lv_obj_set_style_arc_color(parc[i], lv_color_hex(c), LV_PART_INDICATOR);
                      } else {
                        lv_label_set_text(plbl[i], "");
                        lv_label_set_text(pval[i], "");
                        lv_label_set_text(phl[i], "");
                        lv_arc_set_value(parc[i], 0);
                      }
                    }

                    // --- pbs datastores (gauge cards, footer = GC age) ---
                    lv_obj_t* blbl[4] = { id(b0l), id(b1l), id(b2l), id(b3l) };
                    lv_obj_t* barc[4] = { id(b0a), id(b1a), id(b2a), id(b3a) };
                    lv_obj_t* bval[4] = { id(b0v), id(b1v), id(b2v), id(b3v) };
                    lv_obj_t* bgc[4]  = { id(b0g), id(b1g), id(b2g), id(b3g) };
                    JsonArrayConst pbs = root["pbs"];
                    for (int i = 0; i < 4; i++) {
                      if (i < (int) pbs.size()) {
                        const char* nm = pbs[i]["name"] | "?";
                        int used = pbs[i]["used"] | 0;
                        bool has_gc = !pbs[i]["gc_age_h"].isNull();
                        float gc_h = pbs[i]["gc_age_h"] | 0.0f;
                        lv_label_set_text(blbl[i], nm);
                        snprintf(buf, sizeof(buf), "%d%%", used);
                        lv_label_set_text(bval[i], buf);
                        if (has_gc) snprintf(buf, sizeof(buf), "GC %.0fh", gc_h);
                        else        snprintf(buf, sizeof(buf), "GC --");
                        lv_label_set_text(bgc[i], buf);
                        lv_arc_set_value(barc[i], used);
                        uint32_t c = c_ok;
                        if (used >= 85) c = c_warn;                // near full
                        if (has_gc && gc_h > 48.0f) c = c_warn;    // amber if GC older than 2 days
                        lv_obj_set_style_arc_color(barc[i], lv_color_hex(c), LV_PART_INDICATOR);
                      } else {
                        lv_label_set_text(blbl[i], "");
                        lv_label_set_text(bval[i], "");
                        lv_label_set_text(bgc[i], "");
                        lv_arc_set_value(barc[i], 0);
                      }
                    }
                    return true;
                  });
      # drive the RGB LED from the alert flag (red on alert, dark otherwise)
      - if:
          condition:
            lambda: "return id(g_alert);"
          then:
            - output.turn_on: led_r
            - output.turn_off: led_g
            - output.turn_off: led_b
          else:
            - output.turn_off: led_r
            - output.turn_off: led_g
            - output.turn_off: led_b

  # auto-cycle: once idle (no touch for 10s), advance one page every 5s
  - interval: 5s
    then:
      - if:
          condition:
            lambda: "return id(g_idle);"
          then:
            - lambda: 'id(g_diag) = false;'
            - lvgl.page.next:

  # refresh the diagnostics page from wifi/system info every 2s
  - interval: 2s
    then:
      - lambda: |-
          char b[64];
          snprintf(b, sizeof(b), "ID: %s   fw ${fw_version}", id(g_panel_id).c_str());
          lv_label_set_text(id(d_id), b);
          snprintf(b, sizeof(b), "SSID: %s", id(wifi_ssid).state.c_str());
          lv_label_set_text(id(d_ssid), b);
          float rssi = id(wifi_rssi).state;
          if (rssi != rssi) snprintf(b, sizeof(b), "Signal: (disconnected)");
          else              snprintf(b, sizeof(b), "Signal: %.0f dBm", rssi);
          lv_label_set_text(id(d_sig), b);
          snprintf(b, sizeof(b), "IP: %s", id(wifi_ip).state.c_str());
          lv_label_set_text(id(d_ip), b);
          snprintf(b, sizeof(b), "BSSID: %s", id(wifi_bssid).state.c_str());
          lv_label_set_text(id(d_bssid), b);
          snprintf(b, sizeof(b), "MAC: %s", id(wifi_mac).state.c_str());
          lv_label_set_text(id(d_mac), b);
          uint32_t up = (uint32_t) id(sys_uptime).state;
          snprintf(b, sizeof(b), "Up: %ud %02uh %02um", up/86400, (up%86400)/3600, (up%3600)/60);
          lv_label_set_text(id(d_uptime), b);
          snprintf(b, sizeof(b), "Heap: %.0fK free / %.0fK blk",
                   id(heap_free).state / 1024.0f, id(heap_block).state / 1024.0f);
          lv_label_set_text(id(d_heap), b);
          snprintf(b, sizeof(b), "Reset: %s", id(reset_reason).state.c_str());
          lv_label_set_text(id(d_rst), b);
