# =============================================================================
# Homelab status panel for the ESP32-2432S028R ("Cheap Yellow Display")
#
# Polls the FastAPI aggregator and renders cluster / pool / PBS health with
# LVGL. RGB LED goes red on any alert; backlight auto-dims from the LDR.
#
# BEFORE FLASHING:
#   1. Run `esphome config homelab-panel.yaml` to validate. The LVGL block is
#      the most likely place for a version-sensitive syntax tweak.
#   2. Confirm your board variant. Most 2432S028R units are ILI9341 (set below).
#      Some later runs ship an ST7789 panel and/or swap the USB chip and a few
#      pins. If the screen is blank/garbled, that's the first thing to check.
#   3. Set the secrets below (wifi + aggregator URL).
# =============================================================================

substitutions:
  name: homelab-panel
  agg_url: "http://10.10.10.14/api/status"   # production aggregator on the LXC
  poll_interval: "15s"
  fw_version: "2026.06.29-1"

esphome:
  name: ${name}
  friendly_name: Homelab Panel
  name_add_mac_suffix: true   # unique per board: homelab-panel-<mac6>; also the panel id
  platformio_options:
    upload_speed: 115200      # this board's CH340 is unreliable above 115200
  on_boot:
    - lambda: |-
        id(g_panel_id) = get_mac_address().substr(6);
        id(backlight).set_level(1.0);   // full brightness: LDR is covered by the case

esp32:
  board: esp32dev
  framework:
    type: arduino   # http_request + lvgl is most battle-tested on arduino here

logger:
  level: INFO

api:
ota:
  - platform: esphome

wifi:
  # One firmware, multiple locations: the panel connects to whichever configured
  # network it finds (best signal). Hidden SSIDs need hidden: true so the device
  # attempts them without relying on a scan.
  power_save_mode: none   # wall-powered panel: prioritise a stable link
  networks:
    - ssid: !secret wifi_jb_ssid          # work lab (hidden)
      password: !secret wifi_jb_password
      hidden: true
    - ssid: !secret wifi_home_ssid        # home (placeholder until finalized)
      password: !secret wifi_home_password
      hidden: true                        # set false if the home SSID broadcasts

# --- networking for the aggregator poll -------------------------------------
http_request:
  useragent: esphome/cyd-panel
  timeout: 6s
  verify_ssl: false   # aggregator is plain HTTP on the LAN; harmless either way

json:

globals:
  - id: g_alert
    type: bool
    restore_value: no
    initial_value: "false"
  - id: g_panel_id
    type: std::string
    restore_value: no
  # multi-page nav state
  - id: g_idle
    type: bool
    restore_value: no
    initial_value: "false"
  - id: g_touch_active
    type: bool
    restore_value: no
    initial_value: "false"
  - id: g_touch_start_x
    type: int
    restore_value: no
    initial_value: "0"
  - id: g_touch_last_x
    type: int
    restore_value: no
    initial_value: "0"

# --- two SPI buses: display and touch are separate on this board ------------
spi:
  - id: tft
    clk_pin: 14
    mosi_pin: 13
    miso_pin: 12
  - id: touchbus
    clk_pin: 25
    mosi_pin: 32
    miso_pin: 39

# --- backlight (PWM) + LDR auto-dim -----------------------------------------
output:
  - platform: ledc
    pin: 21
    id: backlight
    frequency: 1000Hz
  # RGB LED is common-anode / active LOW on the CYD, so invert each channel.
  - platform: gpio
    pin: 4
    id: led_r
    inverted: true
  - platform: gpio
    pin: 16
    id: led_g
    inverted: true
  - platform: gpio
    pin: 17
    id: led_b
    inverted: true

sensor:
  - platform: adc
    pin: 34          # LDR / light sensor
    name: "Ambient light"
    id: ldr
    update_interval: 5s
    attenuation: 12db
    filters:
      - sliding_window_moving_average:
          window_size: 4
          send_every: 4
    # Auto-dim disabled: the LDR is covered by the enclosure, so it always reads
    # dark and would dim the screen. Backlight is pinned to full in on_boot. If a
    # panel ever runs without a case, restore an on_value lambda to drive backlight.

display:
  - platform: ili9xxx
    model: ST7789V          # this board is the ST7789 variant (not ILI9341)
    invert_colors: false    # this panel does NOT invert; true turns green bars purple
    id: cyd_display
    spi_id: tft
    cs_pin: 15
    dc_pin: 2
    rotation: 270           # landscape, 320x240
    auto_clear_enabled: false
    update_interval: never  # LVGL drives the display

touchscreen:
  - platform: xpt2046
    id: touch
    spi_id: touchbus
    cs_pin: 33
    interrupt_pin: 36
    update_interval: 50ms
    # Calibration values are board-specific; tweak after a first flash.
    calibration:
      x_min: 280
      x_max: 3860
      y_min: 340
      y_max: 3860
    transform:
      swap_xy: true
    # Swipe: record start-x on first contact, track movement, decide on release.
    # A tap (no horizontal movement) just cancels the auto-cycle.
    on_update:
      # fires every update_interval while touched, so it tracks finger movement
      # (on_touch only fires once on initial press, which can't measure a swipe)
      - lambda: |-
          if (!touches.empty()) {
            int x = touches[0].x;
            if (!id(g_touch_active)) {
              id(g_touch_active) = true;
              id(g_touch_start_x) = x;
            }
            id(g_touch_last_x) = x;
            id(g_idle) = false;
          }
    on_release:
      - lambda: 'id(g_touch_active) = false; id(g_idle) = false;'
      - if:
          condition:
            lambda: 'return (id(g_touch_last_x) - id(g_touch_start_x)) <= -40;'
          then:
            - lvgl.page.next:
      - if:
          condition:
            lambda: 'return (id(g_touch_last_x) - id(g_touch_start_x)) >= 40;'
          then:
            - lvgl.page.previous:

# --- the dashboard ----------------------------------------------------------
lvgl:
  # No PSRAM on this CYD: a full-screen buffer (320x240x2 = 150KB) won't fit in
  # internal RAM alongside WiFi. Buffer a quarter-screen and render in chunks.
  buffer_size: 25%
  disp_bg_color: 0xFFFFFF   # light theme: white bg, black text (this panel renders light)
  default_font: montserrat_14
  page_wrap: true           # loop Cluster -> Pools -> Backups -> Cluster
  # After 10s with no touch, mark idle so the auto-cycle interval advances pages.
  on_idle:
    timeout: 10s
    then:
      - lambda: 'id(g_idle) = true;'
  pages:
    # --- page 1: cluster / nodes ---
    - id: page_cluster
      widgets:
        - label: { id: t_cluster, x: 6,   y: 4, text: "CLUSTER", text_color: 0x000000 }
        - label: { id: pg1,       x: 280, y: 4, text: "1/3",     text_color: 0x909090 }
        - label: { id: n0, x: 8, y: 32,  text: "", text_color: 0x000000 }
        - label: { id: n1, x: 8, y: 72,  text: "", text_color: 0x000000 }
        - label: { id: n2, x: 8, y: 112, text: "", text_color: 0x000000 }
        - label: { id: n3, x: 8, y: 152, text: "", text_color: 0x000000 }
        - label: { id: n4, x: 8, y: 192, text: "", text_color: 0x000000 }
    # --- page 2: truenas pools ---
    - id: page_pools
      widgets:
        - label: { id: t_pools, x: 6,   y: 4, text: "POOLS", text_color: 0x000000 }
        - label: { id: pg2,     x: 280, y: 4, text: "2/3",   text_color: 0x909090 }
        - label: { id: p0l, x: 8, y: 32,  text: "", text_color: 0x000000 }
        - bar:   { id: p0b, x: 8, y: 50,  width: 300, height: 8, min_value: 0, max_value: 100, value: 0 }
        - label: { id: p1l, x: 8, y: 76,  text: "", text_color: 0x000000 }
        - bar:   { id: p1b, x: 8, y: 94,  width: 300, height: 8, min_value: 0, max_value: 100, value: 0 }
        - label: { id: p2l, x: 8, y: 120, text: "", text_color: 0x000000 }
        - bar:   { id: p2b, x: 8, y: 138, width: 300, height: 8, min_value: 0, max_value: 100, value: 0 }
        - label: { id: p3l, x: 8, y: 164, text: "", text_color: 0x000000 }
        - bar:   { id: p3b, x: 8, y: 182, width: 300, height: 8, min_value: 0, max_value: 100, value: 0 }
    # --- page 3: pbs datastores ---
    - id: page_pbs
      widgets:
        - label: { id: t_pbs, x: 6,   y: 4, text: "BACKUPS", text_color: 0x000000 }
        - label: { id: pg3,   x: 280, y: 4, text: "3/3",     text_color: 0x909090 }
        - label: { id: b0l, x: 8, y: 32,  text: "", text_color: 0x000000 }
        - bar:   { id: b0b, x: 8, y: 50,  width: 300, height: 8, min_value: 0, max_value: 100, value: 0 }
        - label: { id: b1l, x: 8, y: 76,  text: "", text_color: 0x000000 }
        - bar:   { id: b1b, x: 8, y: 94,  width: 300, height: 8, min_value: 0, max_value: 100, value: 0 }
        - label: { id: b2l, x: 8, y: 120, text: "", text_color: 0x000000 }
        - bar:   { id: b2b, x: 8, y: 138, width: 300, height: 8, min_value: 0, max_value: 100, value: 0 }
        - label: { id: b3l, x: 8, y: 164, text: "", text_color: 0x000000 }
        - bar:   { id: b3b, x: 8, y: 182, width: 300, height: 8, min_value: 0, max_value: 100, value: 0 }

# --- poll + parse + render --------------------------------------------------
interval:
  - interval: ${poll_interval}
    then:
      - http_request.get:
          url: ${agg_url}
          capture_response: true
          # self-report identity so the admin UI can track this panel
          request_headers:
            x-panel-id: !lambda 'return id(g_panel_id).c_str();'
            x-panel-version: "${fw_version}"
          on_response:
            then:
              - lambda: |-
                  if (response->status_code != 200) {
                    lv_label_set_text(id(t_cluster), "CLUSTER  unreachable");
                    lv_obj_set_style_text_color(id(t_cluster), lv_color_hex(0xCC0000), 0);
                    lv_obj_set_style_text_color(id(t_pools),   lv_color_hex(0xCC0000), 0);
                    lv_obj_set_style_text_color(id(t_pbs),     lv_color_hex(0xCC0000), 0);
                    id(g_alert) = true;
                    return;
                  }
                  json::parse_json(body, [](JsonObjectConst root) -> bool {
                    char buf[48];

                    bool quorate = root["quorate"] | false;
                    bool alert = root["alert"] | false;
                    id(g_alert) = alert;

                    // page titles: amber on alert; cluster also shows quorum (red if lost)
                    uint32_t tcol = alert ? 0xC07000 : 0x000000;
                    snprintf(buf, sizeof(buf), "CLUSTER  quorum:%s", quorate ? "OK" : "LOST");
                    lv_label_set_text(id(t_cluster), buf);
                    lv_obj_set_style_text_color(id(t_cluster),
                        lv_color_hex(quorate ? tcol : 0xCC0000), 0);
                    lv_obj_set_style_text_color(id(t_pools), lv_color_hex(tcol), 0);
                    lv_obj_set_style_text_color(id(t_pbs),   lv_color_hex(tcol), 0);

                    // --- cluster nodes ---
                    lv_obj_t* nlbl[5] = { id(n0), id(n1), id(n2), id(n3), id(n4) };
                    JsonArrayConst nodes = root["nodes"];
                    for (int i = 0; i < 5; i++) {
                      if (i < (int) nodes.size()) {
                        const char* nm = nodes[i]["name"] | "?";
                        bool up = nodes[i]["up"] | false;
                        int cpu = nodes[i]["cpu"] | 0;
                        int mem = nodes[i]["mem"] | 0;
                        if (up) snprintf(buf, sizeof(buf), "%-9s cpu %2d%%  mem %2d%%", nm, cpu, mem);
                        else    snprintf(buf, sizeof(buf), "%-9s  ** DOWN **", nm);
                        lv_label_set_text(nlbl[i], buf);
                        lv_obj_set_style_text_color(nlbl[i],
                            up ? lv_color_hex(0x000000) : lv_color_hex(0xCC0000), 0);
                      } else {
                        lv_label_set_text(nlbl[i], "");
                      }
                    }

                    // --- truenas pools ---
                    lv_obj_t* plbl[4] = { id(p0l), id(p1l), id(p2l), id(p3l) };
                    lv_obj_t* pbar[4] = { id(p0b), id(p1b), id(p2b), id(p3b) };
                    JsonArrayConst pools = root["pools"];
                    for (int i = 0; i < 4; i++) {
                      if (i < (int) pools.size()) {
                        const char* nm = pools[i]["name"] | "?";
                        const char* hl = pools[i]["health"] | "?";
                        bool ok = pools[i]["ok"] | false;
                        int used = pools[i]["used"] | 0;
                        snprintf(buf, sizeof(buf), "%-12s %s  %d%%", nm, hl, used);
                        lv_label_set_text(plbl[i], buf);
                        lv_bar_set_value(pbar[i], used, LV_ANIM_OFF);
                        uint32_t c = 0x4CAF50;            // green
                        if (!ok) c = 0xCC0000;            // degraded/unhealthy
                        else if (used >= 85) c = 0xC07000; // near full
                        lv_obj_set_style_bg_color(pbar[i], lv_color_hex(c), LV_PART_INDICATOR);
                      } else {
                        lv_label_set_text(plbl[i], "");
                        lv_bar_set_value(pbar[i], 0, LV_ANIM_OFF);
                      }
                    }

                    // --- pbs datastores ---
                    lv_obj_t* blbl[4] = { id(b0l), id(b1l), id(b2l), id(b3l) };
                    lv_obj_t* bbar[4] = { id(b0b), id(b1b), id(b2b), id(b3b) };
                    JsonArrayConst pbs = root["pbs"];
                    for (int i = 0; i < 4; i++) {
                      if (i < (int) pbs.size()) {
                        const char* nm = pbs[i]["name"] | "?";
                        int used = pbs[i]["used"] | 0;
                        bool has_gc = !pbs[i]["gc_age_h"].isNull();
                        float gc_h = pbs[i]["gc_age_h"] | 0.0f;
                        if (has_gc) snprintf(buf, sizeof(buf), "%-12s %d%%  GC %.0fh", nm, used, gc_h);
                        else        snprintf(buf, sizeof(buf), "%-12s %d%%  GC --", nm, used);
                        lv_label_set_text(blbl[i], buf);
                        lv_bar_set_value(bbar[i], used, LV_ANIM_OFF);
                        uint32_t c = 0x4CAF50;
                        if (used >= 85) c = 0xC07000;              // near full
                        if (has_gc && gc_h > 48.0f) c = 0xC07000;  // amber if GC older than 2 days
                        lv_obj_set_style_bg_color(bbar[i], lv_color_hex(c), LV_PART_INDICATOR);
                      } else {
                        lv_label_set_text(blbl[i], "");
                        lv_bar_set_value(bbar[i], 0, LV_ANIM_OFF);
                      }
                    }
                    return true;
                  });
      # drive the RGB LED from the alert flag (red on alert, dim green otherwise)
      - if:
          condition:
            lambda: "return id(g_alert);"
          then:
            - output.turn_on: led_r
            - output.turn_off: led_g
            - output.turn_off: led_b
          else:
            - output.turn_off: led_r
            - output.turn_off: led_g   # leave green off too for a dark idle; flip to turn_on if you want a green "all good" light
            - output.turn_off: led_b

  # auto-cycle: once idle (no touch for 10s), advance one page every 5s
  - interval: 5s
    then:
      - if:
          condition:
            lambda: "return id(g_idle);"
          then:
            - lvgl.page.next:
