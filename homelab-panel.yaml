# =============================================================================
# Homelab status panel for the ESP32-2432S028R ("Cheap Yellow Display")
#
# Polls the FastAPI aggregator and renders cluster / pool / PBS health with
# LVGL. RGB LED goes red on any alert.
#
# This board (confirmed): ST7789V panel, non-inverting, no PSRAM. Light + dark
# themes supported; default dark. Gestures: swipe L/R = page nav, double-tap =
# diagnostics page, long-press = toggle dark/light. Auto-cycles when idle.
#
# BEFORE FLASHING: `esphome config homelab-panel.yaml` to validate (the LVGL
# block is the most version-sensitive part).
# =============================================================================

substitutions:
  name: homelab-panel
  agg_url: "http://10.10.10.14/api/status"   # production aggregator on the LXC
  poll_interval: "15s"
  fw_version: "2026.07.01-1"

esphome:
  name: ${name}
  friendly_name: Homelab Panel
  name_add_mac_suffix: true   # unique per board: homelab-panel-<mac6>; also the panel id
  platformio_options:
    upload_speed: 115200      # this board's CH340 is unreliable above 115200
  on_boot:
    - lambda: |-
        id(g_panel_id) = get_mac_address().substr(6);
        id(backlight).set_level(1.0);   // full brightness: LDR is covered by the case
    - script.execute: apply_theme       # paint the persisted dark/light theme

esp32:
  board: esp32dev
  framework:
    type: arduino   # http_request + lvgl is most battle-tested on arduino here

logger:
  level: INFO

# heap / reset-reason instrumentation (surfaced on the diagnostics page)
debug:
  update_interval: 30s

api:
  # Standalone panel: nothing connects to the native API (no Home Assistant), so
  # disable the default 15-min "reboot if no client" timeout that was resetting it.
  reboot_timeout: 0s
ota:
  - platform: esphome

wifi:
  # One firmware, multiple locations: the panel connects to whichever configured
  # network it finds. Mark a network hidden ONLY if its SSID is not broadcast.
  power_save_mode: none   # wall-powered panel: prioritise a stable link
  networks:
    - ssid: !secret wifi_jb_ssid          # work lab (hidden SSID)
      password: !secret wifi_jb_password
      hidden: true
    - ssid: !secret wifi_home_ssid        # home (UniFi, broadcasts its SSID)
      password: !secret wifi_home_password
      hidden: false

# --- networking for the aggregator poll -------------------------------------
http_request:
  useragent: esphome/cyd-panel
  timeout: 6s
  verify_ssl: false   # aggregator is plain HTTP on the LAN; harmless either way

json:

globals:
  - id: g_alert
    type: bool
    restore_value: no
    initial_value: "false"
  - id: g_panel_id
    type: std::string
    restore_value: no
  # multi-page nav + gesture state
  - id: g_idle
    type: bool
    restore_value: no
    initial_value: "false"
  - id: g_touch_active
    type: bool
    restore_value: no
    initial_value: "false"
  - id: g_touch_start_x
    type: int
    restore_value: no
    initial_value: "0"
  - id: g_touch_last_x
    type: int
    restore_value: no
    initial_value: "0"
  - id: g_touch_start_y
    type: int
    restore_value: no
    initial_value: "0"
  - id: g_touch_last_y
    type: int
    restore_value: no
    initial_value: "0"
  - id: g_touch_start_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"
  - id: g_last_tap_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"
  - id: g_last_tap_x
    type: int
    restore_value: no
    initial_value: "0"
  - id: g_last_nav_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"
  - id: g_gesture
    type: int
    restore_value: no
    initial_value: "0"
  - id: g_diag
    type: bool
    restore_value: no
    initial_value: "false"
  - id: g_dark              # dark mode default-on, persists across reboots
    type: bool
    restore_value: yes
    initial_value: "true"

# --- two SPI buses: display and touch are separate on this board ------------
spi:
  - id: tft
    clk_pin: 14
    mosi_pin: 13
    miso_pin: 12
  - id: touchbus
    clk_pin: 25
    mosi_pin: 32
    miso_pin: 39

# --- backlight (PWM) + LDR (unused, covered) --------------------------------
output:
  - platform: ledc
    pin: 21
    id: backlight
    frequency: 1000Hz
  # RGB LED is common-anode / active LOW on the CYD, so invert each channel.
  - platform: gpio
    pin: 4
    id: led_r
    inverted: true
  - platform: gpio
    pin: 16
    id: led_g
    inverted: true
  - platform: gpio
    pin: 17
    id: led_b
    inverted: true

sensor:
  - platform: adc
    pin: 34          # LDR / light sensor
    name: "Ambient light"
    id: ldr
    update_interval: 5s
    attenuation: 12db
    filters:
      - sliding_window_moving_average:
          window_size: 4
          send_every: 4
    # Auto-dim disabled: the LDR is covered by the enclosure, so it always reads
    # dark. Backlight is pinned to full in on_boot.
  - platform: wifi_signal   # for the diagnostics page
    id: wifi_rssi
    update_interval: 5s
  - platform: uptime
    id: sys_uptime
    update_interval: 5s
  - platform: debug
    free:
      id: heap_free
      name: "Heap Free"
    block:
      id: heap_block
      name: "Heap Largest Block"

# --- wifi info + reset reason for the diagnostics page ----------------------
text_sensor:
  - platform: wifi_info
    ip_address:
      id: wifi_ip
    ssid:
      id: wifi_ssid
    bssid:
      id: wifi_bssid
    mac_address:
      id: wifi_mac
  - platform: debug
    reset_reason:
      id: reset_reason
      name: "Reset Reason"

display:
  - platform: ili9xxx
    model: ST7789V          # this board is the ST7789 variant (not ILI9341)
    invert_colors: false    # this panel does NOT invert; true turns green bars purple
    id: cyd_display
    spi_id: tft
    cs_pin: 15
    dc_pin: 2
    rotation: 270           # landscape, 320x240
    auto_clear_enabled: false
    update_interval: never  # LVGL drives the display

touchscreen:
  - platform: xpt2046
    id: touch
    spi_id: touchbus
    cs_pin: 33
    interrupt_pin: 36
    update_interval: 50ms
    # Calibration values are board-specific; tweak after a first flash.
    calibration:
      x_min: 280
      x_max: 3860
      y_min: 340
      y_max: 3860
    transform:
      swap_xy: true
    on_update:
      # fires every update_interval while touched, so it tracks finger movement
      # and press duration (on_touch only fires once on initial press)
      - lambda: |-
          if (!touches.empty()) {
            int x = touches[0].x;
            int y = touches[0].y;
            if (!id(g_touch_active)) {
              id(g_touch_active) = true;
              id(g_touch_start_x) = x;
              id(g_touch_start_y) = y;
              id(g_touch_start_ms) = millis();
            }
            id(g_touch_last_x) = x;
            id(g_touch_last_y) = y;
            id(g_idle) = false;
          }
    on_release:
      # classify the gesture: 1=next 2=prev 3=diag-toggle 4=dark-toggle
      - lambda: |-
          id(g_touch_active) = false;
          id(g_idle) = false;
          uint32_t now = millis();
          int dx = id(g_touch_last_x) - id(g_touch_start_x);
          int dy = id(g_touch_last_y) - id(g_touch_start_y);
          uint32_t dur = now - id(g_touch_start_ms);
          bool moved = (abs(dx) > 30) || (abs(dy) > 30);
          bool in_cooldown = (now - id(g_last_nav_ms) < 350);
          int g = 0;
          if (abs(dx) >= 40 && abs(dx) >= abs(dy)) {
            // swipe; cooldown rejects touch chatter that splits one drag in two
            if (!in_cooldown) {
              g = (dx < 0) ? 2 : 1;   // swipe left = previous, swipe right = next
              id(g_last_nav_ms) = now;
            }
          } else if (!in_cooldown) {
            // Only classify taps/long-press outside the post-swipe cooldown, so a
            // swipe's chatter fragments can't be read as taps and pair into a
            // false double-tap.
            if (!moved && dur >= 600) {
              g = 4;                              // long press
            } else if (!moved) {
              // double tap: quick AND near the previous tap's position
              if (now - id(g_last_tap_ms) < 300 &&
                  abs(id(g_touch_start_x) - id(g_last_tap_x)) < 50) {
                g = 3; id(g_last_tap_ms) = 0;
              } else {
                id(g_last_tap_ms) = now;
                id(g_last_tap_x) = id(g_touch_start_x);
              }
            }
          }
          id(g_gesture) = g;
      - if:
          condition: { lambda: 'return id(g_gesture) == 1;' }
          then:
            - lambda: 'id(g_diag) = false;'
            - lvgl.page.next:
      - if:
          condition: { lambda: 'return id(g_gesture) == 2;' }
          then:
            - lambda: 'id(g_diag) = false;'
            - lvgl.page.previous:
      - if:
          condition: { lambda: 'return id(g_gesture) == 3;' }
          then:
            - if:
                condition: { lambda: 'return !id(g_diag);' }
                then:
                  - lvgl.page.show: page_diag
                  - lambda: 'id(g_diag) = true;'
                else:
                  - lvgl.page.show: page_cluster
                  - lambda: 'id(g_diag) = false;'
      - if:
          condition: { lambda: 'return id(g_gesture) == 4;' }
          then:
            - lambda: 'id(g_dark) = !id(g_dark);'
            - script.execute: apply_theme

# --- theme: paint page backgrounds + label colors for dark/light ------------
script:
  - id: apply_theme
    then:
      - lambda: |-
          bool dk = id(g_dark);
          uint32_t bg   = dk ? 0x101418 : 0xFFFFFF;
          uint32_t fg   = dk ? 0xF0F0F0 : 0x000000;
          uint32_t mut  = dk ? 0x808080 : 0x909090;
          uint32_t surf = dk ? 0x1b212b : 0xEEF1F5;   // card surface
          uint32_t trk  = dk ? 0x2a2f3a : 0xD5DBE2;   // gauge track
          lv_obj_t* pgs[4] = { id(page_cluster)->obj, id(page_pools)->obj, id(page_pbs)->obj, id(page_diag)->obj };
          for (int i = 0; i < 4; i++) {
            lv_obj_set_style_bg_color(pgs[i], lv_color_hex(bg), 0);
            lv_obj_set_style_bg_opa(pgs[i], LV_OPA_COVER, 0);
          }
          lv_obj_t* cards[] = {
            id(pc0), id(pc1), id(pc2), id(pc3),
            id(bc0), id(bc1), id(bc2), id(bc3),
            id(nc0), id(nc1), id(nc2), id(nc3), id(nc4)
          };
          for (unsigned i = 0; i < sizeof(cards)/sizeof(cards[0]); i++)
            lv_obj_set_style_bg_color(cards[i], lv_color_hex(surf), 0);
          lv_obj_t* trks[] = {
            id(p0a), id(p1a), id(p2a), id(p3a),
            id(b0a), id(b1a), id(b2a), id(b3a),
            id(ca0), id(ca1), id(ca2), id(ca3), id(ca4),
            id(cm0), id(cm1), id(cm2), id(cm3), id(cm4)
          };
          for (unsigned i = 0; i < sizeof(trks)/sizeof(trks[0]); i++)
            lv_obj_set_style_arc_color(trks[i], lv_color_hex(trk), LV_PART_MAIN);
          // arc thickness must be set on BOTH parts (top-level arc_width only
          // styles the track). Thin concentric cluster rings, thicker singles.
          lv_obj_t* thin[] = { id(ca0), id(ca1), id(ca2), id(ca3), id(ca4),
                               id(cm0), id(cm1), id(cm2), id(cm3), id(cm4) };
          for (unsigned i = 0; i < sizeof(thin)/sizeof(thin[0]); i++) {
            lv_obj_set_style_arc_width(thin[i], 3, LV_PART_MAIN);
            lv_obj_set_style_arc_width(thin[i], 3, LV_PART_INDICATOR);
          }
          lv_obj_t* thick[] = { id(p0a), id(p1a), id(p2a), id(p3a),
                                id(b0a), id(b1a), id(b2a), id(b3a) };
          for (unsigned i = 0; i < sizeof(thick)/sizeof(thick[0]); i++) {
            lv_obj_set_style_arc_width(thick[i], 6, LV_PART_MAIN);
            lv_obj_set_style_arc_width(thick[i], 6, LV_PART_INDICATOR);
          }
          lv_obj_t* fgl[] = {
            id(t_cluster), id(t_pools), id(t_pbs), id(t_diag),
            id(cl0), id(cl1), id(cl2), id(cl3), id(cl4),
            id(p0l), id(p1l), id(p2l), id(p3l),
            id(p0v), id(p1v), id(p2v), id(p3v),
            id(b0l), id(b1l), id(b2l), id(b3l),
            id(b0v), id(b1v), id(b2v), id(b3v),
            id(d_id), id(d_ssid), id(d_sig), id(d_ip), id(d_bssid), id(d_mac), id(d_uptime), id(d_heap)
          };
          for (unsigned i = 0; i < sizeof(fgl)/sizeof(fgl[0]); i++)
            lv_obj_set_style_text_color(fgl[i], lv_color_hex(fg), 0);
          lv_obj_t* mtl[] = {
            id(pg1), id(pg2), id(pg3), id(pg_diag), id(d_rst),
            id(p0h), id(p1h), id(p2h), id(p3h),
            id(b0g), id(b1g), id(b2g), id(b3g),
            id(cv0), id(cv1), id(cv2), id(cv3), id(cv4)
          };
          for (unsigned i = 0; i < sizeof(mtl)/sizeof(mtl[0]); i++)
            lv_obj_set_style_text_color(mtl[i], lv_color_hex(mut), 0);

# --- the dashboard ----------------------------------------------------------
lvgl:
  # No PSRAM on this CYD: a full-screen buffer (320x240x2 = 150KB) won't fit in
  # internal RAM alongside WiFi. Buffer a quarter-screen and render in chunks.
  buffer_size: 25%
  disp_bg_color: 0x101418   # default dark; apply_theme sets per-page bg by g_dark
  default_font: montserrat_14
  page_wrap: true           # loop Cluster -> Pools -> Backups (diag is skipped)
  # After 10s with no touch, mark idle so the auto-cycle interval advances pages.
  on_idle:
    timeout: 10s
    then:
      - lambda: 'id(g_idle) = true;'
  pages:
    # --- page 1: cluster / nodes ---
    - id: page_cluster
      widgets:
        - label: { id: t_cluster, x: 8, y: 6, text: "CLUSTER", text_color: 0xF0F0F0, text_font: montserrat_16 }
        - label: { id: pg1, x: 286, y: 8, text: "1/3", text_color: 0x808080 }
        # 5 node cards: 3 across the top, 2 on the bottom. Each has concentric
        # rings: CPU outer (cyan), MEM inner (orange), values in the footer.
        - obj:
            id: nc0
            x: 6
            y: 30
            width: 100
            height: 100
            radius: 10
            border_width: 0
            pad_all: 0
            bg_color: 0x1b212b
            widgets:
              - label: { id: cl0, align: TOP_MID, y: 4, text: "", text_color: 0xF0F0F0 }
              - arc: { id: ca0, align: CENTER, y: 3, width: 66, height: 66, min_value: 0, max_value: 100, value: 0, adjustable: false, arc_width: 3, arc_color: 0x2a2f3a, indicator: { arc_color: 0x33CCFF }, knob: { bg_opa: TRANSP } }
              - arc: { id: cm0, align: CENTER, y: 3, width: 58, height: 58, min_value: 0, max_value: 100, value: 0, adjustable: false, arc_width: 3, arc_color: 0x2a2f3a, indicator: { arc_color: 0xFF9F40 }, knob: { bg_opa: TRANSP } }
              - label: { id: cv0, align: BOTTOM_MID, y: -3, text: "", text_color: 0x808080, text_font: montserrat_12 }
        - obj:
            id: nc1
            x: 110
            y: 30
            width: 100
            height: 100
            radius: 10
            border_width: 0
            pad_all: 0
            bg_color: 0x1b212b
            widgets:
              - label: { id: cl1, align: TOP_MID, y: 4, text: "", text_color: 0xF0F0F0 }
              - arc: { id: ca1, align: CENTER, y: 3, width: 66, height: 66, min_value: 0, max_value: 100, value: 0, adjustable: false, arc_width: 3, arc_color: 0x2a2f3a, indicator: { arc_color: 0x33CCFF }, knob: { bg_opa: TRANSP } }
              - arc: { id: cm1, align: CENTER, y: 3, width: 58, height: 58, min_value: 0, max_value: 100, value: 0, adjustable: false, arc_width: 3, arc_color: 0x2a2f3a, indicator: { arc_color: 0xFF9F40 }, knob: { bg_opa: TRANSP } }
              - label: { id: cv1, align: BOTTOM_MID, y: -3, text: "", text_color: 0x808080, text_font: montserrat_12 }
        - obj:
            id: nc2
            x: 214
            y: 30
            width: 100
            height: 100
            radius: 10
            border_width: 0
            pad_all: 0
            bg_color: 0x1b212b
            widgets:
              - label: { id: cl2, align: TOP_MID, y: 4, text: "", text_color: 0xF0F0F0 }
              - arc: { id: ca2, align: CENTER, y: 3, width: 66, height: 66, min_value: 0, max_value: 100, value: 0, adjustable: false, arc_width: 3, arc_color: 0x2a2f3a, indicator: { arc_color: 0x33CCFF }, knob: { bg_opa: TRANSP } }
              - arc: { id: cm2, align: CENTER, y: 3, width: 58, height: 58, min_value: 0, max_value: 100, value: 0, adjustable: false, arc_width: 3, arc_color: 0x2a2f3a, indicator: { arc_color: 0xFF9F40 }, knob: { bg_opa: TRANSP } }
              - label: { id: cv2, align: BOTTOM_MID, y: -3, text: "", text_color: 0x808080, text_font: montserrat_12 }
        - obj:
            id: nc3
            x: 6
            y: 132
            width: 100
            height: 100
            radius: 10
            border_width: 0
            pad_all: 0
            bg_color: 0x1b212b
            widgets:
              - label: { id: cl3, align: TOP_MID, y: 4, text: "", text_color: 0xF0F0F0 }
              - arc: { id: ca3, align: CENTER, y: 3, width: 66, height: 66, min_value: 0, max_value: 100, value: 0, adjustable: false, arc_width: 3, arc_color: 0x2a2f3a, indicator: { arc_color: 0x33CCFF }, knob: { bg_opa: TRANSP } }
              - arc: { id: cm3, align: CENTER, y: 3, width: 58, height: 58, min_value: 0, max_value: 100, value: 0, adjustable: false, arc_width: 3, arc_color: 0x2a2f3a, indicator: { arc_color: 0xFF9F40 }, knob: { bg_opa: TRANSP } }
              - label: { id: cv3, align: BOTTOM_MID, y: -3, text: "", text_color: 0x808080, text_font: montserrat_12 }
        - obj:
            id: nc4
            x: 110
            y: 132
            width: 100
            height: 100
            radius: 10
            border_width: 0
            pad_all: 0
            bg_color: 0x1b212b
            widgets:
              - label: { id: cl4, align: TOP_MID, y: 4, text: "", text_color: 0xF0F0F0 }
              - arc: { id: ca4, align: CENTER, y: 3, width: 66, height: 66, min_value: 0, max_value: 100, value: 0, adjustable: false, arc_width: 3, arc_color: 0x2a2f3a, indicator: { arc_color: 0x33CCFF }, knob: { bg_opa: TRANSP } }
              - arc: { id: cm4, align: CENTER, y: 3, width: 58, height: 58, min_value: 0, max_value: 100, value: 0, adjustable: false, arc_width: 3, arc_color: 0x2a2f3a, indicator: { arc_color: 0xFF9F40 }, knob: { bg_opa: TRANSP } }
              - label: { id: cv4, align: BOTTOM_MID, y: -3, text: "", text_color: 0x808080, text_font: montserrat_12 }
    # --- page 2: truenas pools ---
    - id: page_pools
      widgets:
        - label: { id: t_pools, x: 8, y: 6, text: "POOLS", text_color: 0xF0F0F0, text_font: montserrat_16 }
        - label: { id: pg2, x: 286, y: 8, text: "2/3", text_color: 0x808080 }
        - obj:
            id: pc0
            x: 6
            y: 30
            width: 150
            height: 100
            radius: 10
            border_width: 0
            pad_all: 0
            bg_color: 0x1b212b
            widgets:
              - label: { id: p0l, align: TOP_MID, y: 6, text: "", text_color: 0xF0F0F0 }
              - arc: { id: p0a, align: CENTER, y: 8, width: 66, height: 66, min_value: 0, max_value: 100, value: 0, adjustable: false, arc_width: 6, arc_color: 0x2a2f3a, indicator: { arc_color: 0x33CCFF }, knob: { bg_opa: TRANSP } }
              - label: { id: p0v, align: CENTER, y: 8, text: "", text_color: 0xF0F0F0, text_font: montserrat_16 }
              - label: { id: p0h, align: BOTTOM_MID, y: -4, text: "", text_color: 0x808080, text_font: montserrat_12 }
        - obj:
            id: pc1
            x: 164
            y: 30
            width: 150
            height: 100
            radius: 10
            border_width: 0
            pad_all: 0
            bg_color: 0x1b212b
            widgets:
              - label: { id: p1l, align: TOP_MID, y: 6, text: "", text_color: 0xF0F0F0 }
              - arc: { id: p1a, align: CENTER, y: 8, width: 66, height: 66, min_value: 0, max_value: 100, value: 0, adjustable: false, arc_width: 6, arc_color: 0x2a2f3a, indicator: { arc_color: 0x33CCFF }, knob: { bg_opa: TRANSP } }
              - label: { id: p1v, align: CENTER, y: 8, text: "", text_color: 0xF0F0F0, text_font: montserrat_16 }
              - label: { id: p1h, align: BOTTOM_MID, y: -4, text: "", text_color: 0x808080, text_font: montserrat_12 }
        - obj:
            id: pc2
            x: 6
            y: 132
            width: 150
            height: 100
            radius: 10
            border_width: 0
            pad_all: 0
            bg_color: 0x1b212b
            widgets:
              - label: { id: p2l, align: TOP_MID, y: 6, text: "", text_color: 0xF0F0F0 }
              - arc: { id: p2a, align: CENTER, y: 8, width: 66, height: 66, min_value: 0, max_value: 100, value: 0, adjustable: false, arc_width: 6, arc_color: 0x2a2f3a, indicator: { arc_color: 0x33CCFF }, knob: { bg_opa: TRANSP } }
              - label: { id: p2v, align: CENTER, y: 8, text: "", text_color: 0xF0F0F0, text_font: montserrat_16 }
              - label: { id: p2h, align: BOTTOM_MID, y: -4, text: "", text_color: 0x808080, text_font: montserrat_12 }
        - obj:
            id: pc3
            x: 164
            y: 132
            width: 150
            height: 100
            radius: 10
            border_width: 0
            pad_all: 0
            bg_color: 0x1b212b
            widgets:
              - label: { id: p3l, align: TOP_MID, y: 6, text: "", text_color: 0xF0F0F0 }
