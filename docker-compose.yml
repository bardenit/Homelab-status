services:
  homelab-panel-aggregator:
    build: ./aggregator
    container_name: homelab-panel-aggregator
    restart: unless-stopped
    env_file:
      - ./aggregator/.env
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
